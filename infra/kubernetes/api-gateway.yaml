---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: devtask
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: devtask/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: devtask-config
                  key: AUTH_SERVICE_URL
            - name: TASK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: devtask-config
                  key: TASK_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: devtask-config
                  key: NOTIFICATION_SERVICE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: devtask-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20

---
# API Gateway Service – NodePort (for Minikube/Kind)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: devtask
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
